<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>初心者キャラ診断</title>
  <style>
    :root {
      --bg: #eafaff;
      --panel: rgba(255, 255, 255, .42);
      --panel-2: rgba(255, 255, 255, .28);
      --ink: #0d2f3d;
      --muted: #527283;
      --line: rgba(112, 184, 212, .34);
      --cyan: #19bce6;
      --yellow: #4dd7c8;
      --red: #e85f7a;
      --green: #27c99b;
      --shadow: 0 26px 80px rgba(44, 128, 164, .22);
      font-family: "Noto Sans JP", "Yu Gothic", Meiryo, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(120deg, rgba(255, 255, 255, .72), rgba(177, 236, 250, .48) 45%, rgba(209, 255, 244, .64)),
        var(--bg);
      background-size: auto;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, .42) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 255, 255, .34) 1px, transparent 1px);
      background-size: 54px 54px;
      opacity: .55;
    }

    button { font: inherit; }

    .shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0;
      min-height: 100vh;
      display: grid;
      align-items: center;
    }

    .arena {
      position: relative;
      overflow: hidden;
      min-height: calc(100vh - 44px);
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .72), rgba(215, 248, 255, .34)),
        var(--panel);
      box-shadow: var(--shadow);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 24px clamp(18px, 4vw, 44px);
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, .48), rgba(255, 255, 255, .12));
    }

    .kicker {
      margin: 0 0 6px;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .12em;
    }

    h1, h2, h3, p { letter-spacing: 0; }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 64px);
      line-height: 1;
      font-weight: 900;
    }

    .status {
      min-width: 150px;
      text-align: right;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .stage {
      padding: clamp(18px, 4vw, 46px);
      padding-bottom: clamp(18px, 4vw, 46px);
    }

    .topline {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .progress {
      height: 8px;
      border-radius: 999px;
      background: rgba(148, 163, 184, .18);
      overflow: hidden;
    }

    .progress i {
      display: block;
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--yellow));
      transition: width .2s ease;
    }

    .question-card,
    .result-panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .68), rgba(220, 248, 255, .30)),
        rgba(255, 255, 255, .36);
      padding: clamp(18px, 4vw, 34px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .70), 0 10px 24px rgba(44, 128, 164, .10);
    }

    .question-card h2 {
      margin: 0;
      font-size: clamp(24px, 4vw, 44px);
      line-height: 1.25;
    }

    .question-card .desc {
      max-width: 760px;
      margin: 14px 0 24px;
      color: var(--muted);
      line-height: 1.8;
    }

    .precision-note {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      border: 1px solid rgba(25, 188, 230, .28);
      border-radius: 999px;
      padding: 7px 10px;
      color: #087b94;
      background: rgba(255, 255, 255, .42);
      font-size: 12px;
      font-weight: 900;
    }

    .scale-labels {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-weight: 900;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .choice {
      min-height: 112px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(160deg, rgba(255, 255, 255, .60), rgba(207, 244, 255, .24));
      color: var(--ink);
      cursor: pointer;
      padding: 12px;
      text-align: left;
      transition: border-color .14s ease, background .14s ease;
    }

    .choice:hover,
    .choice:focus-visible {
      border-color: var(--cyan);
      background: linear-gradient(160deg, rgba(255, 255, 255, .82), rgba(136, 232, 249, .30));
      outline: none;
    }

    .choice b {
      display: block;
      color: #087b94;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .choice span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .46);
      color: var(--ink);
      padding: 0 15px;
      cursor: pointer;
      font-weight: 900;
    }

    .btn:hover,
    .btn:focus-visible {
      border-color: var(--cyan);
      outline: none;
    }

    .btn:disabled {
      opacity: .42;
      cursor: not-allowed;
    }

    .btn.strong {
      background: var(--cyan);
      border-color: var(--cyan);
      color: #ffffff;
      box-shadow: 0 6px 14px rgba(25, 188, 230, .16);
    }

    .btn.share {
      background: var(--yellow);
      border-color: var(--yellow);
      color: #063c43;
    }

    .result-panel { display: none; }
    .result-panel.show { display: block; }
    .question-screen.hidden { display: none; }

    .result-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      margin-bottom: 18px;
    }

    .result-head h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.1;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .cost-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 14px;
    }

    .cost-tab {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .48);
      color: var(--muted);
      padding: 0 14px;
      cursor: pointer;
      font-weight: 900;
    }

    .cost-tab.is-active {
      border-color: var(--cyan);
      background: var(--cyan);
      color: #fff;
    }

    .insight-panel {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, .9fr);
      gap: 12px;
      margin-bottom: 14px;
    }

    .insight-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, .46);
      padding: 14px;
    }

    .insight-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
      color: var(--yellow);
    }

    .profile-grid {
      display: grid;
      gap: 9px;
    }

    .profile-row {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) 72px 42px;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .profile-row i {
      position: relative;
      height: 8px;
      border-radius: 999px;
      background:
        repeating-linear-gradient(90deg, rgba(13, 47, 61, .18) 0 1px, transparent 1px 10%),
        rgba(64, 155, 187, .12);
    }

    .profile-row i::after {
      content: "";
      position: absolute;
      top: 50%;
      left: var(--pos);
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: var(--cyan);
      transform: translate(-50%, -50%);
      box-shadow: 0 0 8px rgba(56, 215, 255, .35);
    }

    .profile-score {
      display: inline-grid;
      place-items: center;
      min-width: 34px;
      min-height: 26px;
      border-radius: 999px;
      background: rgba(25, 188, 230, .14);
      color: #087b94;
      font-weight: 900;
    }

    .plan-list {
      display: grid;
      gap: 9px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .plan-list li {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr);
      gap: 9px;
      align-items: start;
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }

    .plan-list b {
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: rgba(255, 209, 102, .16);
      color: var(--yellow);
      font-size: 12px;
    }

    .compare-panel {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 14px 0;
    }

    .compare-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(224, 255, 249, .48);
      padding: 12px;
      min-height: 124px;
    }

    .compare-card strong {
      display: block;
      margin-bottom: 6px;
      color: var(--green);
      font-size: 13px;
    }

    .extra-panel {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 14px 0;
    }

    .extra-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, .46);
      padding: 14px;
    }

    .extra-card h3 {
      margin: 0 0 10px;
      color: var(--yellow);
      font-size: 16px;
    }

    .playstyle-name {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.15;
      font-weight: 900;
      color: var(--ink);
    }

    .playstyle-note {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 13px;
    }

    .warning-list,
    .exclude-list,
    .cost-list,
    .roadmap-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .warning-list li,
    .exclude-list li,
    .cost-list li,
    .roadmap-list li {
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }

    .warning-list li {
      border-left: 3px solid var(--red);
      padding-left: 9px;
    }

    .roadmap-list li {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 9px;
    }

    .roadmap-list b,
    .cost-list b,
    .exclude-list b {
      color: var(--ink);
    }

    .cost-list li {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(148, 163, 184, .16);
      padding-bottom: 7px;
    }

    .history-panel {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 14px 0;
    }

    .history-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, .48);
      padding: 12px;
    }

    .history-card strong {
      display: block;
      color: #0b3445;
      margin-bottom: 6px;
    }

    .history-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }

    .history-empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .compare-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 13px;
    }

    .card {
      position: relative;
      min-height: 280px;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255, 255, 255, .52);
      cursor: pointer;
      text-align: left;
      color: var(--ink);
      padding: 0;
    }

    .card img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
      background: linear-gradient(145deg, rgba(255, 255, 255, .62), rgba(151, 232, 250, .26));
    }

    .card-art {
      position: absolute;
      inset: 0 0 auto 0;
      height: 150px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .62), rgba(151, 232, 250, .26));
      color: rgba(13, 47, 61, .22);
      font-size: 42px;
      font-weight: 900;
    }

    .card-body {
      padding: 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, .88), rgba(219, 248, 255, .96));
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
    }

    .card h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      color: #0b3445;
    }

    .rank {
      display: inline-grid;
      place-items: center;
      min-width: 38px;
      min-height: 30px;
      border-radius: 6px;
      background: var(--yellow);
      color: #063c43;
      font-weight: 900;
    }

    .meta {
      color: #315f73;
      font-size: 12px;
      font-weight: 800;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .tags span {
      border: 1px solid rgba(25, 188, 230, .42);
      border-radius: 999px;
      padding: 4px 7px;
      color: #075a72;
      background: rgba(211, 248, 255, .92);
      font-size: 11px;
      font-weight: 800;
    }

    .match {
      margin-top: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(64, 155, 187, .16);
      overflow: hidden;
    }

    .match i {
      display: block;
      width: var(--match);
      height: 100%;
      background: linear-gradient(90deg, #20b892, #11a9d1);
    }

    dialog {
      position: fixed;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      width: min(920px, calc(100% - 24px));
      max-height: calc(100vh - 34px);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 0;
      color: var(--ink);
      background: rgba(240, 253, 255, .82);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    dialog::backdrop {
      background: rgba(20, 77, 97, .38);
    }

    .modal-shell {
      display: grid;
      grid-template-rows: 1fr auto;
      max-height: calc(100vh - 34px);
      background: rgba(240, 253, 255, .94);
    }

    .modal {
      padding: 20px;
      display: grid;
      grid-template-columns: 210px minmax(0, 1fr);
      gap: 18px;
      max-height: calc(100vh - 112px);
      overflow: auto;
      min-height: 0;
      align-items: start;
    }

    .modal img {
      width: 100%;
      min-width: 0;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .34);
    }

    .modal > div {
      min-width: 0;
    }

    .modal h3 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .modal p,
    .modal li {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .modal ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .breakdown {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .breakdown-row {
      display: grid;
      grid-template-columns: 92px 1fr 46px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .score-components {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .score-components span {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      color: var(--muted);
      background: rgba(255, 255, 255, .38);
      font-size: 12px;
      font-weight: 800;
    }

    .breakdown-row i {
      height: 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .10);
      overflow: hidden;
    }

    .breakdown-row b {
      display: block;
      width: var(--axis-fit);
      height: 100%;
      background: linear-gradient(90deg, var(--yellow), var(--cyan));
    }

    .close-row {
      display: flex;
      justify-content: flex-end;
      padding: 12px 20px 18px;
      border-top: 1px solid var(--line);
      background: rgba(240, 253, 255, .94);
    }

    .detail-list-title {
      margin: 14px 0 4px;
      color: var(--ink);
      font-weight: 900;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(12px);
      opacity: 0;
      pointer-events: none;
      background: #f8fafc;
      color: #0f172a;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 800;
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 900px) {
      .choice-grid,
      .result-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .insight-panel,
      .compare-panel,
      .extra-panel,
      .history-panel {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .shell { width: min(100% - 16px, 1180px); padding: 8px 0; }
      .arena { min-height: calc(100vh - 16px); }
      header,
      .stage { padding: 16px; }
      header,
      .result-head {
        display: grid;
      }
      .status { text-align: left; }
      .choice-grid,
      .result-grid,
      .insight-panel,
      .compare-panel,
      .extra-panel,
      .history-panel,
      .modal {
        grid-template-columns: 1fr;
      }
      .choice { min-height: 86px; }
      .topline { grid-template-columns: 1fr; }
      .actions { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="arena" aria-labelledby="title">
      <header>
        <div>
          <p class="kicker">BEGINNER FLOW</p>
          <h1 id="title">初心者キャラ診断</h1>
        </div>
        <div class="status" id="status">TARGET SELECT // 8 PICKS</div>
      </header>

      <div class="stage">
        <section class="question-screen" id="questionScreen">
          <div class="topline">
            <span id="stepText"></span>
            <div class="progress" aria-hidden="true"><i id="progress"></i></div>
            <span>LIVE SELECT</span>
          </div>

          <article class="question-card" aria-live="polite">
            <p class="kicker" id="axisText"></p>
            <h2 id="questionTitle" tabindex="-1"></h2>
            <p class="desc" id="questionDesc"></p>
            <div class="scale-labels">
              <span id="leftLabel"></span>
              <span id="rightLabel"></span>
            </div>
            <div class="choice-grid" id="choiceGrid"></div>
          </article>

          <div class="actions">
            <button class="btn" type="button" id="backBtn">戻る</button>
            <button class="btn" type="button" id="resetBtn">最初から</button>
          </div>
        </section>

        <section class="result-panel" id="resultPanel" aria-live="polite">
          <div class="result-head">
            <div>
              <p class="kicker">CHARACTER SELECT</p>
              <h2>おすすめ候補</h2>
            </div>
            <div class="actions">
              <button class="btn strong" type="button" id="retryBtn">もう一度</button>
              <button class="btn share" type="button" id="shareBtn">結果SSをコピー</button>
            </div>
          </div>
          <div class="insight-panel" id="insightPanel"></div>
          <div class="compare-panel" id="comparePanel"></div>
          <div class="extra-panel" id="extraPanel"></div>
          <div class="history-panel" id="historyPanel"></div>
          <div class="cost-tabs" id="costTabs" aria-label="コスト別おすすめ候補"></div>
          <div class="result-grid" id="resultGrid" aria-label="診断結果のおすすめ候補8体"></div>
        </section>
      </div>
    </section>
  </main>

  <dialog id="modal">
    <div class="modal-shell">
      <div class="modal" id="modalBody"></div>
      <div class="close-row"><button class="btn" type="button" id="closeModal">閉じる</button></div>
    </div>
  </dialog>
  <div class="toast" id="toast">コピーしました</div>

  <script src="starward-source-data.js"></script>
  <script>
    const questions = [
      {
        id: "rangeStyle",
        axis: "RANGE STYLE",

      const topFiveGap = ranked[0].score - ranked[Math.min(4, ranked.length - 1)].score;
      return gap < 7 || topFiveGap < 18;

    function analyzeCandidate(candidate) {
      let score = Number(candidate.priority || 0) + Number(candidate.rankScore || 0) * 1.2;
      const matched = [];
      const breakdown = [];
      const components = {
        preference: 0,
        difficulty: 0,
        beginner: 0,
        cost: 0,
        stability: 0,
        growth: 0,
        rank: Number(candidate.priority || 0) + Number(candidate.rankScore || 0) * 1.2
      };

      questions.forEach((q) => {
        const axis = q.id;
        const desired = Number(answers[axis] ?? 3);
        const actual = Number(candidate.axes?.[axis]);
        if (Number.isNaN(actual)) return;
        const weight = axisWeights[axis] || 12;
        const distance = Math.abs(actual - desired);
        const axisScore = distanceScore(distance, weight);
        score += axisScore;
        components.preference += axis === "difficulty" ? 0 : axisScore;

        let penalty = 0;
        if (axis === "difficulty") {
          if (actual === 6 && desired < 5) penalty -= 34;
          else if (actual > desired) penalty -= (actual - desired) * 5;
          score += penalty;
          components.difficulty += axisScore + penalty;
        }

        if (distance <= 1) matched.push(`${axisLabels[axis]}が近い`);
        breakdown.push({
          axis,
          label: axisLabels[axis],
          desired,
          actual,
          distance,
          axisScore: axisScore + penalty,
          fit: clamp(Math.round((1 - Math.min(distance, 4) / 4) * 100), 0, 100)
        });
      });

      const fit = Number(candidate.axes?.beginnerFit ?? candidate.beginnerFit);
      if (!Number.isNaN(fit)) {
        const beginner = beginnerBonus[fit] ?? 0;
        score += beginner;
        components.beginner += beginner;
        if (fit >= 4) matched.push("初心者適性高め");
        if (fit <= 1 && Number(answers.difficulty) <= 2) score -= 8;
      }
      if ([0, 6].includes(Number(candidate.axes?.rangeStyle))) matched.push("射格の規格外枠");
      if (Number(candidate.axes?.difficulty) === 6) matched.push("難度6枠");

      if (answers.costComfort) {
        const desiredCost = Number(answers.costComfort);
        const cost = Number(candidate.cost || String(candidate.costLabel || "").replace(/[^0-9.]/g, ""));
        const costScale = cost >= 3 ? 5 : cost >= 2.5 ? 4 : cost >= 2 ? 2 : 1;
        const costDelta = Math.abs(costScale - desiredCost);
        const costScore = distanceScore(costDelta, 10);
        score += costScore;
        components.cost += costScore;
        if (costDelta <= 1) matched.push("コスト感が近い");
      }

      if (answers.forgiveness) {
        const desiredForgiveness = Number(answers.forgiveness);
        const difficulty = Number(candidate.axes?.difficulty || 3);
        const beginnerFit = Number(candidate.axes?.beginnerFit || 3);
        const stability = clamp(7 - difficulty + beginnerFit, 1, 6);
        const desiredStability = 6 - desiredForgiveness;
        const stabilityDelta = Math.abs(stability - desiredStability);
        const stabilityScore = distanceScore(stabilityDelta, 12);
        score += stabilityScore;
        components.stability += stabilityScore;
        if (stabilityDelta <= 1) matched.push("リカバリー感が近い");
      }

      if (answers.growthStyle) {
        const desiredGrowth = Number(answers.growthStyle);
        const difficulty = Number(candidate.axes?.difficulty || 3);
        const beginnerFit = Number(candidate.axes?.beginnerFit || 3);
        const growth = clamp(Math.round((difficulty + (6 - beginnerFit)) / 2), 1, 5);
        const growthDelta = Math.abs(growth - desiredGrowth);
        const growthScore = distanceScore(growthDelta, 10);
        score += growthScore;
        components.growth += growthScore;
        if (growthDelta <= 1) matched.push("上達スタイルが近い");
      }

      const tone = matchTone(score);
      return {
        ...candidate,
        score,
        match: tone.percent,
        matchLabel: tone.label,
        matchBar: tone.bar,
        matched: [...new Set(matched)].slice(0, 5),
        breakdown,
        components
      };
    }

    function preferenceSummary() {
      return questions.map((q) => {
        const value = Number(answers[q.id] ?? 3);
        const score10 = Math.round(((value - 1) / 4) * 9 + 1);
        const option = q.options.find((item) => Number(item[2]) === value);
        return {
          id: q.id,
          left: q.left,
          right: q.right,
          value,
          score10,
          label: option?.[0] || String(value),
          hint: option?.[1] || "",
          pos: `${((score10 - 1) / 9) * 100}%`
        };
      });
    }

    function trainingPlan(top) {
      const plan = [];
      const difficulty = Number(answers.difficulty || 3);
      const aggression = Number(answers.aggression || 3);
      const rangeStyle = Number(answers.rangeStyle || 3);
      const independence = Number(answers.independence || 3);

      if (rangeStyle <= 2) plan.push("訓練場で赤ロック距離、着地取り、逃げ撃ちの3点を先に確認する。");
      if (rangeStyle >= 4) plan.push("近距離で触る始動、離脱ルート、外した時の逃げ方をセットで覚える。");
      if (difficulty <= 2) plan.push("最初の10戦はコンボより被弾理由のメモを優先する。");
      if (difficulty >= 4) plan.push("難しめ許容なので、まず主力行動を3つに絞ってから増やす。");
      if (aggression <= 2) plan.push("先落ちしない位置取りと、相方が攻めた時の援護だけ練習する。");
      if (aggression >= 4) plan.push("開幕から攻めず、相手のブーストを使わせてから前に出る癖をつける。");
      if (independence <= 2) plan.push("固定相方がいる想定で、合わせやすい射撃や拘束時間を確認する。");
      if (independence >= 4) plan.push("単独で試合を動かす場面と、無理に行かない場面をリプレイで分ける。");
      plan.push(`${top?.name || "1位候補"}は最初に20戦だけ触って、勝敗より操作ストレスを見る。`);
      plan.push("候補上位3体を同じステージで触り、移動・自衛・ダメージの出しやすさを比べる。");
      plan.push("負けた試合を1つ見返して、キャラが悪いのか距離選択が悪いのかを分ける。");
      return [...new Set(plan)].slice(0, 4);
    }

    function compareText(candidate, index) {
      const axes = candidate.axes || {};
      const high = [];
      if (Number(axes.rangeStyle) <= 2) high.push("射撃寄り");
      if (Number(axes.rangeStyle) >= 4) high.push("格闘寄り");
      if (Number(axes.aggression) <= 2) high.push("安定寄り");
      if (Number(axes.aggression) >= 4) high.push("攻め寄り");
      if (Number(axes.independence) <= 2) high.push("連携寄り");
      if (Number(axes.independence) >= 4) high.push("単独寄り");
      const role = high.length ? high.join("・") : "バランス型";
      const labels = ["本命", "対抗", "気分転換"];
      return {
        label: labels[index] || `候補${index + 1}`,
        body: `${candidate.name}は${role}。相性${candidate.match}%なので、${index === 0 ? "最初に触る基準役" : index === 1 ? "本命が合わない時の比較役" : "違う勝ち方を試す予備枠"}に向いています。`
      };
    }

    function playstyleProfile() {
      const range = Number(answers.rangeStyle || 3);
      const diff = Number(answers.difficulty || 3);
      const aggro = Number(answers.aggression || 3);
      const indep = Number(answers.independence || 3);
      const pop = Number(answers.popularity || 3);
      const prefix = range <= 2 ? "堅実射撃" : range >= 4 ? "近距離突破" : "万能対応";
      const core = aggro <= 2 ? "サバイバー" : aggro >= 4 ? "ブレイカー" : "スイッチャー";
      const suffix = indep <= 2 ? "連携型" : indep >= 4 ? "単独型" : "編成対応型";
      const spice = diff >= 4 ? "伸びしろ重視" : diff <= 2 ? "安定入門" : pop >= 4 ? "個性派" : "";
      return {
        name: [spice, prefix + core, suffix].filter(Boolean).join("・"),
        note: "あなたの回答から作った独自プレイスタイル名です。おすすめ順位だけでなく、選ぶ時の軸として使えます。"
      };
    }

    function riskWarnings(top) {
      const warnings = [];
      const axes = top?.axes || {};
      if (Number(axes.difficulty) > Number(answers.difficulty || 3)) {
        warnings.push(`${top.name}は希望より操作難度が高めです。最初は主力行動を絞った方が続きます。`);
      }
      if (Number(axes.beginnerFit) <= 1) {
        warnings.push(`${top.name}は初心者適性が低めです。見た目や動きが刺さる場合の愛枠寄りです。`);
      }
      if (Math.abs(Number(axes.rangeStyle || 3) - Number(answers.rangeStyle || 3)) >= 2) {
        warnings.push("射撃・格闘の好みと上位候補に少しズレがあります。2位以下も必ず触って比べてください。");
      }
      if (Number(answers.popularity) >= 4 && Number(axes.popularity) <= 2) {
        warnings.push("マイナー寄り希望に対して情報量が多い候補が上がっています。個性重視なら別コスト候補も確認しましょう。");
      }
      if (!warnings.length) warnings.push("大きな地雷要素は少なめです。まずは上位3体を触って操作感で決めるのがよさそうです。");
      return warnings.slice(0, 3);
    }

    function firstDayRoadmap(top) {
      const range = Number(top?.axes?.rangeStyle || answers.rangeStyle || 3);
      const diff = Number(top?.axes?.difficulty || answers.difficulty || 3);
      const aggro = Number(top?.axes?.aggression || answers.aggression || 3);
      return [
        ["0分", `${top?.name || "1位候補"}の移動、メイン射撃、格闘、回避を訓練場で触る。`],
        ["15分", range <= 2 ? "着地取りと距離を離す動きを確認する。" : range >= 4 ? "近距離で触る始動と離脱ルートを確認する。" : "射撃始動と格闘始動を1つずつ確認する。"],
        ["30分", diff >= 4 ? "難しい派生は捨てて、使う行動を3つだけに絞る。" : "CPU戦で被弾した場面だけメモする。"],
        ["60分", aggro >= 4 ? "対人で攻める前の待ち時間を意識する。" : "対人で先落ちしない位置取りを優先する。"]
      ];
    }

    function exclusionReasons() {
      const picked = new Set(lastResults.map((item) => item.id));
      return candidates
        .map((candidate) => analyzeCandidate(candidate))
        .filter((candidate) => !picked.has(candidate.id))
        .sort((a, b) => a.score - b.score)
        .slice(0, 3)
        .map((candidate) => {
          const reasons = [];
          const axes = candidate.axes || {};
          if (Math.abs(Number(axes.rangeStyle || 3) - Number(answers.rangeStyle || 3)) >= 3) reasons.push("射撃/格闘の好みが遠い");
          if (Number(axes.difficulty || 3) > Number(answers.difficulty || 3) + 1) reasons.push("操作難度が高い");
          if (Number(axes.beginnerFit || 3) <= 1) reasons.push("初心者適性が低い");
          if (Math.abs(Number(axes.aggression || 3) - Number(answers.aggression || 3)) >= 3) reasons.push("攻め/逃げの方針が遠い");
          return { name: candidate.name, reason: reasons[0] || "総合スコアが上位候補に届かなかった" };
        });
    }

    function costSuggestions() {
      const bestByCost = new Map();
      lastResults.forEach((candidate) => {
        const key = candidate.costLabel || `${candidate.cost}コスト`;
        if (!bestByCost.has(key)) bestByCost.set(key, candidate);
      });
      candidates
        .map((candidate) => analyzeCandidate(candidate))
        .sort((a, b) => b.score - a.score)
        .forEach((candidate) => {
          const key = candidate.costLabel || `${candidate.cost}コスト`;
          if (!bestByCost.has(key)) bestByCost.set(key, candidate);
        });
      return Array.from(bestByCost.entries())
        .sort((a, b) => Number(String(b[0]).replace(/[^0-9.]/g, "")) - Number(String(a[0]).replace(/[^0-9.]/g, "")))
        .slice(0, 5);
    }

        </section>

    const historyKey = "starwardallDiagnosisHistory";

    function readHistory() {
      try {
        const parsed = JSON.parse(localStorage.getItem(historyKey) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveCurrentHistory() {
      const style = playstyleProfile();
      const entry = {
        savedAt: new Date().toISOString(),
        playstyle: style.name,
        top: lastResults.slice(0, 3).map((candidate) => ({
          name: candidate.name,
          cost: candidate.costLabel || `${candidate.cost}コスト`,
          match: candidate.match,
          label: candidate.matchLabel || "PICK"
        }))
      };
      const history = readHistory();
      history.unshift(entry);
      localStorage.setItem(historyKey, JSON.stringify(history.slice(0, 6)));
    }

    function formatHistoryTime(iso) {
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return "前回";
      return `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
    }

    function renderHistory() {
      const history = readHistory().slice(1, 3);
      if (!history.length) {
        historyPanel.innerHTML = `<section class="history-card"><strong>直近2件の履歴</strong><p class="history-empty">次回以降、ここに前回の診断結果が表示されます。</p></section>`;
        return;
      }
      historyPanel.innerHTML = history.map((entry, index) => {
        const picks = (entry.top || []).map((item) => `${item.name} ${item.match || "-"}%`).join(" / ");
        return `
          <section class="history-card">
            <strong>${index === 0 ? "前回" : "前々回"}: ${esc(entry.playstyle || "診断結果")}</strong>
            <p>${esc(formatHistoryTime(entry.savedAt))}</p>
            <p>${esc(picks || "候補なし")}</p>
          </section>
        `;

    function renderInsights() {
      const prefs = preferenceSummary();

      insightPanel.innerHTML = `
        <section class="insight-card">
          <h3>あなたの診断プロファイル</h3>
          <div class="profile-grid">
            ${prefs.map((item) => `
              <div class="profile-row">
                <span>${esc(item.left)}</span>
                <i style="--pos:${item.pos}" title="${esc(item.label)} / 10段階: ${item.score10}"></i>
                <span>${esc(item.right)}</span>

              </div>
            `).join("")}
          </div>
        </section>
        <section class="insight-card">
          <h3>最初の練習メニュー</h3>
          <ul class="plan-list">
            ${trainingPlan(top).map((item, index) => `<li><b>${index + 1}</b><span>${esc(item)}</span></li>`).join("")}
          </ul>

      `;

      comparePanel.innerHTML = lastResults.slice(0, 3).map((candidate, index) => {

    function showResults() {
      allRankedResults = rankedCandidates();

      questionScreen.classList.add("hidden");

    function resultsForFilter(filter) {

        ? allRankedResults

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderList(items) {
      return (items || []).map((text) => `<li>${esc(text)}</li>`).join("");
    }

    function openDetail(candidate) {
      try {
        const axes = candidate.axes || {};
        const detailBreakdown = Array.isArray(candidate.breakdown) && candidate.breakdown.length
          ? candidate.breakdown
          : questions.map((q) => {
            const desired = Number(answers[q.id] ?? 3);
            const actual = Number(axes[q.id] ?? 3);
            const distance = Math.abs(actual - desired);
            return {
              axis: q.id,
              label: axisLabels[q.id],
              desired,
              actual,
              distance,
              fit: clamp(Math.round((1 - Math.min(distance, 4) / 4) * 100), 0, 100)
            };
          });

        const axisRows = questions.map((q) => {
          const user = answers[q.id] ?? "-";
          const char = axes[q.id] ?? "-";
          return `<li>${esc(q.left)} ${esc(char)} / ${esc(q.right)}、あなたの回答 ${esc(user)}（${esc(word(q.id, char))}）</li>`;
        }).join("");
      const breakdownRows = detailBreakdown.map((row) => `
        <div class="breakdown-row">
          <span>${esc(row.label)}</span>
          <i><b style="--axis-fit:${row.fit}%"></b></i>
          <span>${esc(row.fit)}%</span>
        </div>
      `).join("");
        const scoreComponents = candidate.components ? `
          <div class="score-components">
            <span>好み一致 ${Math.round(candidate.components.preference)}</span>
            <span>難度補正 ${Math.round(candidate.components.difficulty)}</span>
            <span>初心者補正 ${Math.round(candidate.components.beginner)}</span>
            <span>コスト補正 ${Math.round(candidate.components.cost || 0)}</span>
            <span>安定補正 ${Math.round(candidate.components.stability || 0)}</span>
            <span>成長補正 ${Math.round(candidate.components.growth || 0)}</span>
          </div>
        ` : "";
        const tags = (candidate.matched || []).map((text) => `<span>${esc(text)}</span>`).join("");
        modalBody.innerHTML = `
        <img src="${esc(candidate.image)}" alt="${esc(candidate.name)}" onerror="this.style.display='none'">
        <div>
          <p class="kicker">${esc(candidate.matchLabel || "PICK")} / MATCH ${esc(candidate.match ?? "-")}%</p>
          <h3>${esc(candidate.name)}</h3>
          <p><b>${esc(candidate.costLabel || `${candidate.cost}コスト`)} / 総合 ${esc(candidate.totalRank || candidate.rank)} / 初心者 ${esc(candidate.beginnerRank || candidate.rank)}</b></p>
          <p>${esc(candidate.summary)}</p>
          <div class="tags">${tags}</div>
          ${scoreComponents}
          <div class="breakdown">${breakdownRows}</div>
          ${candidate.reasons?.length ? `<p class="detail-list-title">おすすめ理由</p><ul>${renderList(candidate.reasons)}</ul>` : ""}
          ${candidate.cautions?.length ? `<p class="detail-list-title">注意点</p><ul>${renderList(candidate.cautions)}</ul>` : ""}
          <p class="detail-list-title">回答との対応</p>
          <ul>${axisRows}</ul>
        </div>
      `;
      } catch (error) {
        modalBody.innerHTML = `
          <div>
            <p class="kicker">DETAIL</p>
            <h3>${esc(candidate?.name || "キャラクター詳細")}</h3>
            <p>詳細の表示中に問題が起きました。結果カード自体の順位は診断スコアに基づいています。</p>
          </div>
        `;
      }
      if (modal.open) modal.close();
      modal.showModal();
      modal.scrollTop = 0;
      modalBody.scrollTop = 0;
      modal.querySelector(".modal-shell")?.scrollTo(0, 0);
      requestAnimationFrame(() => {
        modal.scrollTop = 0;
        modalBody.scrollTop = 0;
      });
    }

    function resetFlow() {
      step = 0;
      answers = {};
      lastResults = [];
      allRankedResults = [];
      activeQuestions = questions;
      precisionMode = false;
      rankedCache = null;
      activeCostFilter = "all";

    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function loadShareImage(src) {
      return new Promise((resolve) => {
        if (!src) {
          resolve(null);
          return;
        }
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.decoding = "async";
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    function roundRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function drawCoverImage(ctx, img, x, y, width, height) {
      const scale = Math.max(width / img.naturalWidth, height / img.naturalHeight);
      const sw = width / scale;
      const sh = height / scale;
      const sx = (img.naturalWidth - sw) / 2;
      const sy = (img.naturalHeight - sh) / 2;
      ctx.drawImage(img, sx, sy, sw, sh, x, y, width, height);
    }

    async function createResultShareBlob() {
      const picks = lastResults.slice(0, 8);
      if (!picks.length) return null;
      const canvas = document.createElement("canvas");
      canvas.width = 1200;
      canvas.height = 630;
      const ctx = canvas.getContext("2d");
      if (!ctx) return null;

      const bg = ctx.createLinearGradient(0, 0, 1200, 630);
      bg.addColorStop(0, "#f8feff");
      bg.addColorStop(.52, "#dff8ff");
      bg.addColorStop(1, "#d8fff5");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, 1200, 630);

      ctx.strokeStyle = "rgba(25, 188, 230, .20)";
      ctx.lineWidth = 1;
      for (let x = 0; x <= 1200; x += 60) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, 630);
        ctx.stroke();
      }
      for (let y = 0; y <= 630; y += 60) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(1200, y);
        ctx.stroke();
      }

      ctx.fillStyle = "#0d2f3d";
      ctx.font = "900 48px 'Noto Sans JP', sans-serif";
      ctx.fillText("初心者キャラ診断 結果", 58, 86);
      ctx.fillStyle = "#19bce6";
      ctx.font = "900 24px 'Noto Sans JP', sans-serif";
      ctx.fillText("TOP 8 CHARACTER SELECT", 62, 122);

      const images = await Promise.all(picks.map((pick) => loadShareImage(pick.image)));
      picks.forEach((pick, index) => {
        const col = index % 4;
        const row = Math.floor(index / 4);
        const x = 58 + col * 280;
        const y = 150 + row * 205;
        const w = 250;
        const h = 178;
        ctx.save();
        roundRect(ctx, x, y, w, h, 20);
        ctx.fillStyle = "rgba(255, 255, 255, .72)";
        ctx.fill();
        ctx.strokeStyle = "rgba(112, 184, 212, .42)";
        ctx.stroke();
        ctx.clip();

        const img = images[index];
        if (img) {
          drawCoverImage(ctx, img, x, y, w, 108);
          ctx.fillStyle = "rgba(255,255,255,.82)";
          ctx.fillRect(x, y + 108, w, h - 108);
        } else {
          const cardBg = ctx.createLinearGradient(x, y, x + w, y + 108);
          cardBg.addColorStop(0, "#ffffff");
          cardBg.addColorStop(1, "#9fe8f8");
          ctx.fillStyle = cardBg;
          ctx.fillRect(x, y, w, 108);
          ctx.fillStyle = "rgba(13, 47, 61, .25)";
          ctx.font = "900 48px 'Noto Sans JP', sans-serif";
          ctx.fillText(String(pick.name || "?").slice(0, 2), x + 78, y + 72);
        }

        ctx.restore();
        ctx.fillStyle = "#0d2f3d";
        ctx.font = "900 23px 'Noto Sans JP', sans-serif";
        const name = `${index + 1}. ${pick.name}`;
        ctx.fillText(name.length > 12 ? `${name.slice(0, 12)}…` : name, x + 14, y + 140);
        ctx.fillStyle = "#527283";
        ctx.font = "800 17px 'Noto Sans JP', sans-serif";
        ctx.fillText(`${pick.costLabel || ""} / ${pick.matchLabel || "PICK"} ${pick.match || "-"}%`, x + 14, y + 166);
      });

      ctx.fillStyle = "#527283";
      ctx.font = "800 22px 'Noto Sans JP', sans-serif";
      ctx.fillText("Starwardall Character Finder", 58, 585);

      return new Promise((resolve) => canvas.toBlob(resolve, "image/png", .92));
    }

    backBtn.addEventListener("click", () => {
      if (step > 0) {
        delete answers[activeQuestions[step - 1].id];
        step -= 1;
        if (precisionMode && step < questions.length) {
          activeQuestions = questions;
          precisionMode = false;
          Object.keys(answers).forEach((key) => {
            if (precisionQuestions.some((q) => q.id === key)) delete answers[key];
          });
        }
        renderQuestion();
      }
    });
    resetBtn.addEventListener("click", resetFlow);
    retryBtn.addEventListener("click", resetFlow);
    costTabs.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-cost]");
      if (!button) return;
      activeCostFilter = button.dataset.cost || "all";
      renderCostTabs();
      renderResultCards();
    });
    closeModal.addEventListener("click", () => modal.close());
    window.createResultShareBlob = createResultShareBlob;
    shareBtn.addEventListener("click", async () => {
      const names = lastResults.slice(0, 8).map((c) => c.name).join("、");
      const text = `初心者キャラ診断のおすすめ候補: ${names}`;
      try {
        const blob = await createResultShareBlob();
        if (blob) {
          if (navigator.clipboard && window.ClipboardItem) {
            try {
              await navigator.clipboard.write([
                new ClipboardItem({ "image/png": blob })
              ]);
              showToast("結果SSをコピーしました");
              return;
            } catch (_) {
              // Clipboard image writes can be blocked by browser policy; open the PNG instead.
            }
          }
          window.open(URL.createObjectURL(blob), "_blank", "noopener,noreferrer");
          showToast("結果SSを開きました");
          return;
        }
        await navigator.clipboard.writeText(text);
        showToast("結果テキストをコピーしました");
      } catch (error) {
        try {
          await navigator.clipboard.writeText(text);
          showToast("画像コピー不可のためテキストをコピーしました");
        } catch {
          showToast(text);
        }
      }
    });

    renderQuestion();
  </script>
</body>
</html>
